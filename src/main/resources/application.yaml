spring:
  application:
    name: isb-wakala-investment-account

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Wakala Investment Account"
    businessArea: "Deposits and Investment Accounts"
    businessDomain: "Islamic Deposits"
    functionalPattern: "Fulfill"
    assetType: "Wakala Investment Account"
    controlRecord: "Wakala Investment Account Fulfillment Arrangement"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
